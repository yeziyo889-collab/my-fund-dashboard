name: Run Fund Spider

on:
  push:
    branches:
      - main  # 🌟 核心升级：以后你只要上传新账单，系统就会全自动立刻触发运行，无需手动操作
  workflow_dispatch:  # 🌟 核心升级：允许你在 Actions 页面随时手动点击 "Run workflow" 刷新数据
  schedule:
    - cron: '30 6 * * 1-5'  # 每天中国时间 14:30 自动定时运行（避开周末）

jobs:
  run-spider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python fund_spider.py
