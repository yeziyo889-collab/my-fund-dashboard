name: Update Fund Data

on:
  schedule:
    # 💥 每周一到周五，北京时间下午 3:40 自动运行
    - cron: '40 7 * * 1-5'
  workflow_dispatch: # 允许手动点击运行

# 赋予该任务直接发布网页的最高权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 安装工具箱依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行机器人抓取数据
      run: python fund_spider.py

    - name: 配置 Pages 运行环境
      uses: actions/configure-pages@v5

    - name: 上传网页和数据产物 🚀
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: 直接闪电发布到网页 🎯
      id: deployment
      uses: actions/deploy-pages@v4
