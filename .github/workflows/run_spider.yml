name: Update Fund Data

on:
  schedule:
    # 💥 每周一到周五，北京时间下午 3:40 自动运行
    - cron: '40 7 * * 1-5'
  workflow_dispatch: # 允许手动点击运行

# 显式声明最高写入权限
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4
      with:
        persist-credentials: true # 👑 核心改进 1：强制保持登录凭证，防止身份过期

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 安装工具箱依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行机器人抓取数据
      run: python fund_spider.py

    - name: 提交并推送数据 🚀
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 👑 核心改进 2：直接下发最高通行令牌
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 仅把发生变化的数据文件加入暂存区
        git add data.json
        
        # 检查文件是否有真实改动，有则提交并强行推送，彻底避免塞车
        if ! git diff --cached --quiet; then
          git commit -m "自动更新基金数据"
          git push origin HEAD:main
        else
          echo "数据无变化，跳过推送"
        fi
